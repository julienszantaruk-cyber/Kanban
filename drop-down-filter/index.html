<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Drop-down Widget</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: var(--grist-theme-page-bg);
      color: var(--grist-theme-text);
    }
    #container {
      position: relative;
      height: 100%;
    }
    #search {
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 2px;
      height: 100%;
      background-color: var(--grist-theme-page-panels-main-panel-bg);
      border: none;
      color: var(--grist-theme-text);
    }
    .td100 {
      width: 100%;
      height: 100%;
    }
    .td50 {
      width: 50%;
      height: 100%;
    }
    .dropdown {
      width: 100%;
      box-sizing: border-box;
      margin: 0;
      padding: 2px;
      height: 100%;
      background-color: var(--grist-theme-page-panels-main-panel-bg);
      border: 1px solid var(--grist-theme-table-body-border);
      color: var(--grist-theme-text);
    }
    #error {
      display: none;
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      background: rgba(208, 2, 27, 0.8);
      color: white;
      padding: 2px;
      font-size: 12px;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .dropdown:focus {
      outline: 2px solid var(--grist-theme-cursor);
    }
    .tag {      
      background-color: lightgray;      
      font-size: small;
      border-radius: 4px;
      border-color: transparent;
    }
    .hiddenItem {
      display: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <table id="search">
      <tr>
        <td id="td1" class="td100"><select id="dropdown1" class="dropdown"></select></td>
        <td><button id="type" class="tag _grain803_ hiddenItem" onclick="tagclick()">AND</button></td>
        <td id="td2" class="td50"><select id="dropdown2" class="dropdown hiddenItem"></select></td>
        <td><button class="tag _grain803_" onclick="clearsearch()">X</button></td>
      </tr>
    </table>    
    <div id="error"></div>
  </div>
  <div id="config" style="display: none;">
    <label>Session ID:</label>
    <input type="text" id="sessionid">
    <button id="save" onclick="saveOption()">Apply</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
